name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: Run ruff
        run: ruff check src/ tests/

  # ── Job 2: Type-check ────────────────────────────────────────────────────────
  typecheck:
    name: Type-check (mypy)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache Poetry + pip
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi

      - name: Run mypy
        run: poetry run mypy src/ tests/

  # ── Job 3: Tests (unit + integration) ────────────────────────────────────────
  test:
    name: Tests
    needs: [lint, typecheck]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache Poetry + pip
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi

      - name: Cache Stanza models
        uses: actions/cache@v4.2.3
        with:
          path: ~/stanza_resources
          key: stanza-uk-v1
          restore-keys: stanza-uk-

      - name: Preload Stanza models
        run: poetry run python scripts/preload_stanza.py

      - name: Run unit tests with coverage
        run: >
          poetry run python -m pytest tests/unit/ -v
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage-unit.xml
          --cov-report=html:htmlcov-unit

      - name: Run integration tests with coverage
        run: >
          poetry run python -m pytest tests/integration/ -v -m integration
          --cov=src
          --cov-append
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-unit.xml
            htmlcov/
            htmlcov-unit/
          retention-days: 14
