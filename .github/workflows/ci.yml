name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: Run ruff
        run: ruff check src/ tests/

  # ── Job 2: Tests (unit + integration) ────────────────────────────────────────
  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache Poetry + pip
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi

      - name: Cache Stanza models
        uses: actions/cache@v4.2.3
        with:
          path: ~/stanza_resources
          key: stanza-uk-v1
          restore-keys: stanza-uk-

      - name: Preload Stanza models
        run: poetry run python scripts/preload_stanza.py

      - name: Run unit tests
        run: poetry run python -m pytest tests/unit/ -v

      - name: Run integration tests
        run: poetry run python -m pytest tests/integration/ -v -m integration
